<svg xmlns="http://www.w3.org/2000/svg" width="820" height="210"
     viewBox="0 0 820 210" font-family="Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="820" height="210" fill="white"/>

  <!-- ===== STEP 1: Fixation ===== -->
  <rect x="25"  y="15" width="128" height="95" fill="white" stroke="black" stroke-width="2"/>
  <text x="89" y="67" text-anchor="middle" dominant-baseline="middle" font-size="30" font-weight="normal">+</text>
  <text x="89" y="124" text-anchor="middle" font-size="11" font-style="italic">300–1000 ms</text>
  <text x="89" y="139" text-anchor="middle" font-size="11" font-weight="bold">Fixation</text>

  <!-- Arrow 1 -->
  <line x1="153" y1="62" x2="174" y2="62" stroke="black" stroke-width="2"/>
  <polygon points="170,57 180,62 170,67" fill="black"/>

  <!-- ===== STEP 2: Stimulus ===== -->
  <rect x="180" y="15" width="200" height="95" fill="white" stroke="black" stroke-width="2"/>
  <!-- Left column: circle + square -->
  <circle cx="233" cy="48" r="9" fill="none" stroke="black" stroke-width="2"/>
  <rect    x="224" cy="65" x="224" y="65" width="18" height="18" fill="none" stroke="black" stroke-width="2"/>
  <!-- Central fixation -->
  <text x="280" y="63" text-anchor="middle" dominant-baseline="middle" font-size="16">+</text>
  <!-- Right column: same shapes -->
  <circle cx="327" cy="48" r="9" fill="none" stroke="black" stroke-width="2"/>
  <rect    x="318" y="65" width="18" height="18" fill="none" stroke="black" stroke-width="2"/>
  <!-- Labels -->
  <text x="280" y="124" text-anchor="middle" font-size="11" font-style="italic">500 ms</text>
  <text x="280" y="139" text-anchor="middle" font-size="11" font-weight="bold">Stimulus Pair</text>

  <!-- Arrow 2 -->
  <line x1="380" y1="62" x2="401" y2="62" stroke="black" stroke-width="2"/>
  <polygon points="397,57 407,62 397,67" fill="black"/>

  <!-- ===== STEP 3: Response (blank) ===== -->
  <rect x="407" y="15" width="165" height="95" fill="white" stroke="black" stroke-width="2"/>
  <text x="489" y="124" text-anchor="middle" font-size="11" font-style="italic">≤ 2000 ms</text>
  <text x="489" y="139" text-anchor="middle" font-size="11" font-weight="bold">Response</text>
  <text x="489" y="152" text-anchor="middle" font-size="10">F: Same  /  J: Different</text>

  <!-- Arrow 3 -->
  <line x1="572" y1="62" x2="593" y2="62" stroke="black" stroke-width="2"/>
  <polygon points="589,57 599,62 589,67" fill="black"/>

  <!-- ===== STEP 4: ITI ===== -->
  <rect x="599" y="15" width="130" height="95" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="664" cy="62" r="3" fill="#cccccc"/>
  <text x="664" y="124" text-anchor="middle" font-size="11" font-style="italic">300 ms</text>
  <text x="664" y="139" text-anchor="middle" font-size="11" font-weight="bold">ITI</text>

  <!-- ===== Figure Caption ===== -->
  <line x1="25" y1="165" x2="729" y2="165" stroke="#000000" stroke-width="0.8"/>
  <text x="25" y="179" font-size="10.5">
    <tspan font-weight="bold">Figure 1.</tspan>
    <tspan> Single-trial timeline. Fixation (300–1000 ms) → Stimulus pair (500 ms) → Response window (≤2000 ms) → ITI (300 ms).</tspan>
  </text>
  <text x="25" y="195" font-size="10.5">Output is a standalone .html file with CSS variable parameter panel. No external dependencies.</text>

</svg>
